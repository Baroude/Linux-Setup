# ~/.config/starship.toml
# Catppuccin Mocha — connected two-line prompt
#
# Preview:
# ╭─  mathias@debian  ~/code/project   main ✓ [+2 ~1]  took 3s ─── 23:45 ─╮
# ╰─❯

palette = 'catppuccin_mocha'

format = """
[╭─](overlay0)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$rust\
$nodejs\
$python\
$java\
$golang\
$docker_context\
$cmd_duration\
$fill\
$time\
[─╮](overlay0)
[╰─](overlay0)\
$character\
"""

[fill]
symbol = '─'
style  = 'overlay0'

# --- Prompt character ---
[character]
success_symbol = '[❯](bold mauve)'
error_symbol   = '[❯](bold red)'
vimcmd_symbol  = '[❮](bold green)'

# --- User / Host ---
[username]
format     = '[ $user]($style)'
style_user = 'bold green'
show_always = true

[hostname]
format   = '[@$hostname]($style)  '
style    = 'green'
ssh_only = false
trim_at  = '-'

# --- Directory ---
[directory]
format            = '[ $path]($style)[$lock_symbol]($lock_style)  '
style             = 'bold sapphire'
truncation_length = 4
truncation_symbol = '…/'

# --- Git ---
[git_branch]
format = '[ $branch]($style)'
style  = 'bold mauve'

[git_status]
format    = '([$all_status$ahead_behind]($style))  '
style     = 'bold mauve'
up_to_date  = '[✓](bold green)'
modified    = '[~${count}](bold yellow)'
staged      = '[+${count}](bold green)'
untracked   = '[?${count}](overlay2)'
deleted     = '[✘${count}](bold red)'
renamed     = '[»${count}](bold blue)'
stashed     = '[≡](bold overlay1)'
ahead       = '[⇡${count}](bold green)'
behind      = '[⇣${count}](bold red)'
diverged    = '[⇕⇡${ahead_count}⇣${behind_count}](bold red)'
conflicted  = '[⚡${count}](bold red)'

# --- Command duration ---
[cmd_duration]
format            = '[  $duration]($style)  '
style             = 'yellow'
min_time          = 2000
show_milliseconds = false

# --- Time (right side, before the closing connector) ---
[time]
format      = '[  $time]($style) '
style       = 'overlay1'
time_format = '%H:%M'
disabled    = false

# --- Language / runtime modules ---
[rust]
symbol = ' '
format = '[$symbol$version]($style)  '
style  = 'peach'

[nodejs]
symbol = ' '
format = '[$symbol$version]($style)  '
style  = 'green'

[python]
symbol = ' '
format = '[$symbol$version]($style)  '
style  = 'yellow'

[java]
symbol = ' '
format = '[$symbol$version]($style)  '
style  = 'peach'

[golang]
symbol = ' '
format = '[$symbol$version]($style)  '
style  = 'sapphire'

[docker_context]
symbol = ' '
format = '[$symbol$context]($style)  '
style  = 'blue'

[aws]
symbol = ' '

[conda]
symbol = ' '

[dart]
symbol = ' '

[elixir]
symbol = ' '

[elm]
symbol = ' '

[hg_branch]
symbol = ' '

[julia]
symbol = ' '

[nim]
symbol = ' '

[nix_shell]
symbol = ' '

[perl]
symbol = ' '

[php]
symbol = ' '

[ruby]
symbol = ' '

[swift]
symbol = ' '

# --- Catppuccin Mocha palette ---
[palettes.catppuccin_mocha]
rosewater = '#f5e0dc'
flamingo  = '#f2cdcd'
pink      = '#f5c2e7'
mauve     = '#cba6f7'
red       = '#f38ba8'
maroon    = '#eba0ac'
peach     = '#fab387'
yellow    = '#f9e2af'
green     = '#a6e3a1'
teal      = '#94e2d5'
sky       = '#89dceb'
sapphire  = '#74c7ec'
blue      = '#89b4fa'
lavender  = '#b4befe'
text      = '#cdd6f4'
subtext1  = '#bac2de'
subtext0  = '#a6adc8'
overlay2  = '#9399b2'
overlay1  = '#7f849c'
overlay0  = '#6c7086'
surface2  = '#585b70'
surface1  = '#45475a'
surface0  = '#313244'
base      = '#1e1e2e'
mantle    = '#181825'
crust     = '#11111b'
