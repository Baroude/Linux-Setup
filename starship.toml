# ~/.config/starship.toml
# Catppuccin Mocha palette

palette = 'catppuccin_mocha'

format = """
[$username$hostname](green)[$directory](sapphire)[$git_branch](mauve)[$rust$package](peach)$fill[$time](overlay1)
[$character](bold green) """

[fill]
symbol = ' '

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[✗](bold red)'

[username]
format = '[$user]($style)[@](subtext0)'
style_user = 'green'
show_always = true

[hostname]
ssh_only = false
format = '[$hostname]($style) '
trim_at = '-'
style = 'green'
disabled = false

[directory]
truncation_length = 5
format = '[$path]($style)[$lock_symbol]($lock_style) '
style = 'sapphire'

[git_branch]
symbol = ' '
format = '[$symbol$branch]($style) '
style = 'mauve'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold mauve'

[rust]
symbol = ' '
format = '[$symbol$version]($style) '
style = 'peach'

[package]
symbol = ' '
format = '[$symbol$version]($style) '
style = 'peach'

[time]
time_format = '%H:%M'
format = '[$time]($style)'
style = 'overlay1'
disabled = false

[cmd_duration]
show_milliseconds = false
format = 'took [$duration](bold yellow) '
min_time = 2000
disabled = false

# --- Language modules ---
[golang]
