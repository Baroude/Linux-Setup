# ~/.config/starship.toml
# Catppuccin Mocha — connected ribbon + rounded pill prompt
#
# user@host and directory form one connected ribbon (powerline arrow between them).
# Git, languages, duration, and time are separate rounded pills.
#
# Preview:
#  user@debian  ~/code/project   main ~2    took 3s   23:45  ❯

palette = 'catppuccin_mocha'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$rust\
$nodejs\
$python\
$java\
$golang\
$docker_context\
$cmd_duration\
$time\
$character\
"""

# --- Prompt character ---
[character]
success_symbol = '[❯](bold mauve)'
error_symbol   = '[❯](bold red)'
vimcmd_symbol  = '[❮](bold green)'

# ─────────────────────────────────────────────────────────────────
# Connected ribbon:  user@host  ~/path
# ─────────────────────────────────────────────────────────────────
#   Opening rounded cap + green content — no closing cap here,
#   the ribbon continues into hostname → directory.

[username]
format     = '[](fg:green)[ $user](fg:base bg:green)'
style_user = 'fg:base bg:green'
show_always = true

[hostname]
# Green content, then powerline arrow transitioning into sapphire
format = '[@$hostname ](fg:base bg:green)[](fg:green bg:sapphire)'
style  = 'fg:base bg:green'
ssh_only = false
trim_at  = '-'

[directory]
# Continues in sapphire, then closes with a rounded right cap
format            = '[ $path](fg:base bg:sapphire)[](fg:sapphire) '
style             = 'fg:base bg:sapphire'
truncation_length = 4
truncation_symbol = '…/'

# ─────────────────────────────────────────────────────────────────
# Rounded pills — each independent, separated by a space
# ─────────────────────────────────────────────────────────────────

[git_branch]
# Opens the mauve pill; git_status closes it
format = '[](fg:mauve)[ $branch](fg:base bg:mauve)'
style  = 'fg:base bg:mauve'

[git_status]
# Appends status inside the mauve pill, then closes it
format     = '([ $all_status$ahead_behind](fg:base bg:mauve))[](fg:mauve) '
style      = 'fg:base bg:mauve'
up_to_date = ''
modified   = ' ~${count}'
staged     = ' +${count}'
untracked  = ' ?${count}'
deleted    = ' ✘${count}'
renamed    = ' »${count}'
stashed    = ' ≡'
ahead      = ' ⇡${count}'
behind     = ' ⇣${count}'
diverged   = ' ⇕⇡${ahead_count}⇣${behind_count}'
conflicted = ' ⚡${count}'

[cmd_duration]
format            = '[](fg:yellow)[  $duration](fg:base bg:yellow)[](fg:yellow) '
style             = 'fg:base bg:yellow'
min_time          = 2000
show_milliseconds = false

[time]
format      = '[](fg:overlay0)[  $time](fg:text bg:overlay0)[](fg:overlay0) '
style       = 'fg:text bg:overlay0'
time_format = '%H:%M'
disabled    = false

# ─────────────────────────────────────────────────────────────────
# Language modules — each a rounded pill, only shown when active
# ─────────────────────────────────────────────────────────────────

[rust]
symbol = ' '
format = '[](fg:peach)[$symbol$version](fg:base bg:peach)[](fg:peach) '
style  = 'fg:base bg:peach'

[nodejs]
symbol = ' '
format = '[](fg:green)[$symbol$version](fg:base bg:green)[](fg:green) '
style  = 'fg:base bg:green'

[python]
symbol = ' '
format = '[](fg:yellow)[$symbol$version](fg:base bg:yellow)[](fg:yellow) '
style  = 'fg:base bg:yellow'

[java]
symbol = ' '
format = '[](fg:peach)[$symbol$version](fg:base bg:peach)[](fg:peach) '
style  = 'fg:base bg:peach'

[golang]
symbol = ' '
format = '[](fg:sapphire)[$symbol$version](fg:base bg:sapphire)[](fg:sapphire) '
style  = 'fg:base bg:sapphire'

[docker_context]
symbol = ' '
format = '[](fg:blue)[$symbol$context](fg:base bg:blue)[](fg:blue) '
style  = 'fg:base bg:blue'

# --- Inactive modules ---
[aws]
symbol = ' '

[conda]
symbol = ' '

[dart]
symbol = ' '

[elixir]
symbol = ' '

[elm]
symbol = ' '

[hg_branch]
symbol = ' '

[julia]
symbol = ' '

[nim]
symbol = ' '

[nix_shell]
symbol = ' '

[perl]
symbol = ' '

[php]
symbol = ' '

[ruby]
symbol = ' '

[swift]
symbol = ' '

