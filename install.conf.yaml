- clean: ['~', '~/.config']

- create:
    - ~/.config/kitty
    - ~/.config/plasma-workspace/env

- link:
    # Shell — force: oh-my-zsh creates ~/.zshrc as a real file during install
    ~/.zshrc:
      path: zshrc
      force: true
    ~/.zshenv:
      path: zsh/zshenv

    # Terminal
    ~/.config/kitty/kitty.conf:
      path: kitty/kitty.conf

    # Prompt
    ~/.config/starship.toml:
      path: starship.toml

    # Git
    ~/.gitconfig:
      path: gitconfig

    # Neovim
    ~/.config/nvim:
      path: nvim

    # Qt style (Kvantum) — force: kvantummanager creates the file during Phase 4
    ~/.config/Kvantum/kvantum.kvconfig:
      path: kvantum/kvantum.kvconfig
      force: true

    # GTK theming — force: may exist from system or previous gtk install
    ~/.config/gtk-3.0/settings.ini:
      path: gtk/gtk-3.0-settings.ini
      force: true
    ~/.config/gtk-4.0/gtk.css:
      path: gtk/gtk-4.0-gtk.css
      force: true

    # Wayland / Plasma environment variables
    ~/.config/plasma-workspace/env/envvars.sh:
      path: environment/envvars.sh
